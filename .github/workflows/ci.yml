name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      # npm ci enforces package-lock.json integrity (reproducible installs).
      - name: Install
        run: npm ci

      # Advisory for now: there is pre-existing lint debt (mostly the new
      # react-hooks compiler rules). Surfaced in CI but not yet a hard gate.
      # TODO: clean up the existing lint errors, then drop continue-on-error.
      - name: Lint (advisory)
        run: npm run lint
        continue-on-error: true

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Build
        run: npm run build
        env:
          # Public placeholders so the build succeeds without real secrets.
          NEXT_PUBLIC_SUPABASE_URL: https://example.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ci-placeholder-anon-key
